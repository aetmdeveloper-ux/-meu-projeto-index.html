<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>DEV LEARNING SYSTEM</title>

<style>
body {
  background: #0a0a0a;
  color: #fff;
  font-family: Arial;
  text-align: center;
}

h1 {
  color: #00f0ff;
}

.container {
  max-width: 900px;
  margin: auto;
}

button {
  background: #111;
  color: #00f0ff;
  border: 1px solid #00f0ff;
  padding: 10px;
  margin: 5px;
  cursor: pointer;
}

button:hover {
  background: #00f0ff;
  color: #000;
}

textarea {
  width: 100%;
  height: 200px;
  background: #111;
  color: #0f0;
  border: 1px solid #00f0ff;
  padding: 10px;
}

#output {
  margin-top: 20px;
  padding: 10px;
  background: #111;
  border: 1px solid #00f0ff;
}
</style>
</head>

<body>

<h1>💻 SISTEMA DE ESTUDO DEV</h1>

<div class="container">

  <!-- BOTÕES -->
  <button onclick="showExample('html')">HTML</button>
  <button onclick="showExample('css')">CSS</button>
  <button onclick="showExample('js')">JavaScript</button>

  <!-- CÓDIGO EXEMPLO -->
  <h3>Exemplo:</h3>
  <textarea id="codeBox"></textarea>

  <!-- EXPLICAÇÃO -->
  <div id="explanation"></div>

  <!-- ANALISADOR -->
  <h3>Teste seu código:</h3>
  <textarea id="userCode" placeholder="Cole seu código aqui..."></textarea>

  <button onclick="analyzeCode()">🔍 Analisar Código</button>

  <div id="output"></div>

</div>

<script>

// ===== EXEMPLOS =====
function showExample(type) {
  const codeBox = document.getElementById("codeBox");
  const explanation = document.getElementById("explanation");

  if (type === "html") {
    codeBox.value =
`<html>
  <body>
    <h1>Olá Mundo</h1>
  </body>
</html>`;

    explanation.innerText =
"HTML é a estrutura do site. Aqui criamos um título.";
  }

  if (type === "css") {
    codeBox.value =
`body {
  background: black;
  color: white;
}`;

    explanation.innerText =
"CSS define o estilo. Aqui mudamos cor de fundo e texto.";
  }

  if (type === "js") {
    codeBox.value =
`function ola() {
  alert("Olá!");
}`;

    explanation.innerText =
"JavaScript cria interação. Aqui mostramos um alerta.";
  }
}

// ===== ANALISADOR DE CÓDIGO =====
function analyzeCode() {
  const code = document.getElementById("userCode").value;
  const output = document.getElementById("output");

  let errors = [];

  // ===== HTML CHECK =====
  if (code.includes("<html") && !code.includes("</html>")) {
    errors.push("❌ Falta fechar a tag </html>");
  }

  if (code.includes("<body") && !code.includes("</body>")) {
    errors.push("❌ Falta fechar a tag </body>");
  }

  // ===== JS CHECK =====
  if (code.includes("function") && !code.includes("{")) {
    errors.push("❌ Função sem { }");
  }

  // ===== CSS CHECK =====
  if (code.includes("{") && !code.includes("}")) {
    errors.push("❌ Falta fechar } no CSS");
  }

  // ===== RESULTADO =====
  if (errors.length === 0) {
    output.innerHTML = "✅ Código parece correto!";
  } else {
    output.innerHTML = errors.join("<br>");
  }
}

</script>

</body>
</html>
