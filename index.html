<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>DEV LEARNING SYSTEM</title>

<style>
body {
  background: #0a0a0a;
  color: #fff;
  font-family: Arial;
  text-align: center;
}

h1 {
  color: #00f0ff;
}

.container {
  max-width: 900px;
  margin: auto;
}

button {
  background: #111;
  color: #00f0ff;
  border: 1px solid #00f0ff;
  padding: 10px;
  margin: 5px;
  cursor: pointer;
}

button:hover {
  background: #00f0ff;
  color: #000;
}

textarea {
  width: 100%;
  height: 200px;
  background: #111;
  color: #0f0;
  border: 1px solid #00f0ff;
  padding: 10px;
}

#output {
  margin-top: 20px;
  padding: 10px;
  background: #111;
  border: 1px solid #00f0ff;
}
</style>
</head>

<body>

<h1>💻 SISTEMA DE ESTUDO DEV</h1>

<div class="container">

  <!-- BOTÕES -->
  <button onclick="showExample('html')">HTML</button>
  <button onclick="showExample('css')">CSS</button>
  <button onclick="showExample('js')">JavaScript</button>

  <!-- BUSCA -->
  <h3>Buscar código:</h3>
  <input type="text" id="busca" placeholder="Ex: função, botão, if..." />
  <button onclick="buscarCodigo()">Buscar</button>

  <!-- EXEMPLO -->
  <h3>Exemplo:</h3>
  <textarea id="codeBox"></textarea>

  <!-- EXPLICAÇÃO -->
  <div id="explanation"></div>

  <!-- ANALISADOR -->
  <h3>Teste seu código:</h3>
  <textarea id="userCode" placeholder="Cole seu código aqui..."></textarea>

  <button onclick="analyzeCode()">🔍 Analisar Código</button>

  <div id="output"></div>

</div>

<script>

// ===== BANCO =====
const bancoBusca = [
  {
    palavras: ["função", "function"],
    codigo: `function exemplo() {
  console.log("Executando função");
}`,
    explicacao: "Cria uma função em JavaScript."
  },
  {
    palavras: ["botão", "clique"],
    codigo: `document.getElementById("btn").onclick = function() {
  alert("Clicou!");
};`,
    explicacao: "Executa algo ao clicar."
  },
  {
    palavras: ["if", "condição"],
    codigo: `if (x > 10) {
  console.log("Maior que 10");
} else {
  console.log("Menor ou igual a 10");
}`,
    explicacao: "Estrutura de decisão."
  },
  {
    palavras: ["tempo", "intervalo"],
    codigo: `setInterval(function() {
  console.log("Executando...");
}, 1000);`,
    explicacao: "Executa repetidamente."
  },
  {
    palavras: ["elemento", "id"],
    codigo: `const el = document.getElementById("meuId");
el.innerText = "Texto alterado";`,
    explicacao: "Seleciona elemento."
  }
];

// ===== BUSCA =====
function buscarCodigo() {
  const entrada = document.getElementById("busca").value.toLowerCase();
  const codeBox = document.getElementById("codeBox");
  const explanation = document.getElementById("explanation");

  let resultado = "";
  let explicacaoFinal = "";

  bancoBusca.forEach(item => {
    item.palavras.forEach(p => {
      if (entrada.includes(p)) {
        resultado += "\n// 🔹 " + p + "\n" + item.codigo + "\n";
        explicacaoFinal += "👉 " + item.explicacao + "\n";
      }
    });
  });

  if (resultado === "") {
    codeBox.value = "// ❌ Nenhum resultado encontrado";
    explanation.innerText = "Tente: função, botão, if, intervalo, id";
  } else {
    codeBox.value = resultado;
    explanation.innerText = explicacaoFinal;
  }
}

// ===== EXEMPLOS =====
function showExample(type) {
  const codeBox = document.getElementById("codeBox");
  const explanation = document.getElementById("explanation");

  if (type === "html") {
    codeBox.value =
`<html>
  <body>
    <h1>Olá Mundo</h1>
  </body>
</html>`;
    explanation.innerText = "HTML = estrutura.";
  }

  if (type === "css") {
    codeBox.value =
`body {
  background: black;
  color: white;
}`;
    explanation.innerText = "CSS = estilo.";
  }

  if (type === "js") {
    codeBox.value =
`function ola() {
  alert("Olá!");
}`;
    explanation.innerText = "JS = interação.";
  }
}

// ===== ANALISADOR =====
function analyzeCode() {
  const code = document.getElementById("userCode").value;
  const output = document.getElementById("output");

  let errors = [];

  if (code.includes("<html") && !code.includes("</html>")) {
    errors.push("❌ Falta </html>");
  }

  if (code.includes("<body") && !code.includes("</body>")) {
    errors.push("❌ Falta </body>");
  }

  if (code.includes("function") && !code.includes("{")) {
    errors.push("❌ Função sem { }");
  }

  if (code.includes("{") && !code.includes("}")) {
    errors.push("❌ Falta }");
  }

  if (errors.length === 0) {
    output.innerHTML = "✅ Código parece correto!";
  } else {
    output.innerHTML = errors.join("<br>");
  }
}

</script>

</body>
</html>
