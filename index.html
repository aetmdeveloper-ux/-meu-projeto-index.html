<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>DEV LEARNING SYSTEM</title>

<style>
body {
  background: #0a0a0a;
  color: #fff;
  font-family: Arial;
  text-align: center;
}

h1 {
  color: #00f0ff;
}

.container {
  max-width: 900px;
  margin: auto;
}

/* 🔥 SEPARAÇÃO VISUAL */
.box {
  border: 1px solid #00f0ff;
  margin-top: 20px;
  padding: 15px;
  background: #111;
}

button {
  background: #111;
  color: #00f0ff;
  border: 1px solid #00f0ff;
  padding: 10px;
  margin: 5px;
  cursor: pointer;
}

button:hover {
  background: #00f0ff;
  color: #000;
}

textarea {
  width: 100%;
  height: 180px;
  background: #000;
  color: #0f0;
  border: 1px solid #00f0ff;
  padding: 10px;
}

#output {
  margin-top: 15px;
  padding: 10px;
  background: #000;
  border: 1px solid #00f0ff;
  text-align: left;
}
</style>
</head>

<body>

<h1>💻 SISTEMA DE ESTUDO DEV</h1>

<div class="container">

  <!-- EXEMPLOS -->
  <div class="box">
    <h3>Exemplos:</h3>
    <button onclick="showExample('html')">HTML</button>
    <button onclick="showExample('css')">CSS</button>
    <button onclick="showExample('js')">JavaScript</button>

    <textarea id="codeBox"></textarea>
    <div id="explanation"></div>
  </div>

  <!-- ANALISADOR -->
  <div class="box">
    <h3>Teste seu código:</h3>
    <textarea id="userCode" placeholder="Cole seu código aqui..."></textarea>

    <button onclick="analyzeCode()">🔍 Analisar</button>
    <button onclick="limparTudo()">🧹 Limpar</button>

    <div id="output"></div>
  </div>

</div>

<script>

// ===== EXEMPLOS =====
function showExample(type) {
  const codeBox = document.getElementById("codeBox");
  const explanation = document.getElementById("explanation");

  if (type === "html") {
    codeBox.value =
`<html>
  <body>
    <h1>Olá Mundo</h1>
  </body>
</html>`;
    explanation.innerText = "HTML = estrutura.";
  }

  if (type === "css") {
    codeBox.value =
`body {
  background: black;
  color: white;
}`;
    explanation.innerText = "CSS = estilo.";
  }

  if (type === "js") {
    codeBox.value =
`function ola() {
  alert("Olá!");
}`;
    explanation.innerText = "JS = interação.";
  }
}

// ===== ANALISADOR MELHORADO =====
function analyzeCode() {
  const code = document.getElementById("userCode").value;
  const output = document.getElementById("output");

  output.innerHTML = "";

  let errors = [];
  const linhas = code.split("\n");

  let chaves = 0;

  linhas.forEach((linha, i) => {
    const n = i + 1;

    if (linha.includes("{")) chaves++;
    if (linha.includes("}")) chaves--;

    if (linha.includes("function") && !linha.includes("{")) {
      errors.push(`❌ Linha ${n}: função sem {`);
    }

    if (linha.includes("if") && !linha.includes("(")) {
      errors.push(`❌ Linha ${n}: if sem ()`);
    }
  });

  if (chaves !== 0) {
    errors.push("❌ Erro geral: chaves { } desbalanceadas");
  }

  if (code.includes("<html") && !code.includes("</html>")) {
    errors.push("❌ Falta </html>");
  }

  if (code.includes("<body") && !code.includes("</body>")) {
    errors.push("❌ Falta </body>");
  }

  if (code.trim() === "") {
    output.innerHTML = "⚠️ Digite algum código";
    return;
  }

  if (errors.length === 0) {
    output.innerHTML = "✅ Código analisado: nenhum erro básico";
  } else {
    output.innerHTML = errors.join("<br>");
  }
}

// ===== LIMPAR =====
function limparTudo() {
  document.getElementById("userCode").value = "";
  document.getElementById("codeBox").value = "";
  document.getElementById("output").innerHTML = "";
  document.getElementById("explanation").innerText = "";
}

</script>

</body>
</html>
